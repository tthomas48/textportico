name: CI

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true

      - name: Install
        run: pnpm install

      - name: Check
        run: pnpm exec vp check

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm exec vp test
