name: Publish npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true

      - name: Install
        run: pnpm install

      - name: Check
        run: pnpm exec vp check

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm exec vp test -- --run

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: >-
          pnpm publish
          --filter @textportico/core
          --filter @textportico/provider-twilio
          --access public
          --no-git-checks
